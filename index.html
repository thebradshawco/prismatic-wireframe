<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>thebradshaw.co | Prismatic Wireframe</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        /* Forces 4:5 vertical aspect ratio for social media feed compatibility */
        canvas { display: block; height: 100vh !important; width: auto !important; aspect-ratio: 4/5; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // 1. Setup Scene & Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(1080, 1350); // Optimized for 4:5 high-res displays
        document.body.appendChild(renderer.domElement);

        // 2. Camera Configuration
        // Positioned to ensure the central object stays within 3:4 "safe zones" for grid cropping
        const camera = new THREE.PerspectiveCamera(50, 4 / 5, 1, 3000);
        camera.position.set(0, 30, 245);

        // 3. Diamond Geometry Construction
        // Custom BufferGeometry creates a faceted diamond shape without external assets
        const gemGroup = new THREE.Group();
        gemGroup.position.y = 50; 
        scene.add(gemGroup);

        function createDiamondGeo() {
            const geo = new THREE.BufferGeometry();
            const verts = [];
            const rTop = 10, rMid = 16, yTop = 9, yMid = 0, yBot = -22;
            const segments = 24;

            for (let i = 0; i < segments; i++) {
                const a = (i / segments) * Math.PI * 2, na = ((i + 1) / segments) * Math.PI * 2;
                const c1 = Math.cos(a), s1 = Math.sin(a), c2 = Math.cos(na), s2 = Math.sin(na);
                
                // Top facets
                verts.push(0, yTop, 0, c1*rTop, yTop, s1*rTop, c2*rTop, yTop, s2*rTop);
                // Middle facets
                verts.push(c1*rTop, yTop, s1*rTop, c1*rMid, yMid, s1*rMid, c2*rMid, yMid, s2*rMid);
                verts.push(c1*rTop, yTop, s1*rTop, c2*rMid, yMid, s2*rMid, c2*rTop, yTop, s2*rTop);
                // Bottom point facets
                verts.push(c1*rMid, yMid, s1*rMid, 0, yBot, 0, c2*rMid, yMid, s2*rMid);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            return geo;
        }

        const diamondGeo = createDiamondGeo();
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x88C7D6, wireframe: true });
        const coreDiamond = new THREE.Mesh(diamondGeo, coreMat);
        
        coreDiamond.scale.set(7, 7, 7);
        gemGroup.add(coreDiamond);

        // 4. Liminal Landscape
        // Infinite-loop plane using wireframe for a retro-technical aesthetic
        const landscapeSize = 4000;
        const res = 90; 
        const floorGeo = new THREE.PlaneGeometry(landscapeSize, landscapeSize, res, res);
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x906684, wireframe: true });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -20;
        scene.add(floor);

        // 5. Animation Loop (15-Second Cycle)
        const duration = 15000;
        const start = Date.now();

        function animate() {
            requestAnimationFrame(animate);
            const progress = ((Date.now() - start) % duration) / duration;

            // Rotate diamond 360 degrees per cycle
            gemGroup.rotation.y = progress * Math.PI * 2;

            // Offset floor position to create the illusion of forward movement
            floor.position.z = (progress * (landscapeSize / res) * 40) % (landscapeSize / res * 40);

            camera.lookAt(0, 30, 0);
            renderer.render(scene, camera);
        }
        
        animate();

        // 6. Responsive Handling
        window.addEventListener('resize', () => {
            camera.aspect = 4 / 5;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
